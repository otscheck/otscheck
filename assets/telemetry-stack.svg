  <g transform="translate(690 184)">
    <rect width="280" height="52" rx="12" fill="#0B0D10" stroke="#B79C6A" stroke-opacity=".35"/>
    <text x="18" y="32" class="text">Libateli</text>
    <rect x="153" y="13" width="108" height="26" rx="13" fill="#B79C6A"/>
    <text x="207" y="31" text-anchor="middle" fill="#0B0D10" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700">PRODUCTION</text>

    <rect y="66" width="280" height="52" rx="12" fill="#0B0D10" stroke="#B79C6A" stroke-opacity=".35"/>
    <text x="18" y="98" class="text">Wadoria</text>
    <rect x="153" y="79" width="108" height="26" rx="13" fill="#11151B" stroke="#D6C3A3" stroke-opacity=".65"/>
    <text x="207" y="97" text-anchor="middle" fill="#D6C3A3" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700">FIELD OPS</text>

    <rect y="132" width="280" height="52" rx="12" fill="#0B0D10" stroke="#B79C6A" stroke-opacity=".35"/>
    <text x="18" y="164" class="text">Ekokelo</text>
    <rect x="153" y="145" width="108" height="26" rx="13" fill="#11151B" stroke="#8C7355" stroke-opacity=".75"/>
    <text x="207" y="163" text-anchor="middle" fill="#D6C3A3" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700">R&amp;D</text>

    <rect y="198" width="280" height="52" rx="12" fill="#0B0D10" stroke="#B79C6A" stroke-opacity=".35"/>
    <text x="18" y="230" class="text">O:DS</text>
    <rect x="153" y="211" width="108" height="26" rx="13" fill="#11151B" stroke="#B79C6A" stroke-opacity=".75"/>
    <text x="207" y="229" text-anchor="middle" fill="#F4F1EB" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700">ECOSYSTEM</text>
  </g>

  <g transform="translate(64 520)">
    <text x="0" y="0" class="micro">RADAR READING</text>
    <text x="0" y="32" class="muted">Business architecture, field operations, reporting and resilient production loops.</text>
    <rect x="690" y="-18" width="188" height="36" rx="18" fill="#11151B" stroke="#B79C6A" stroke-opacity=".45"/>
    <text x="784" y="5" text-anchor="middle" class="mono">S²UM: sober / solid / useful / mobile</text>
  </g>
</svg>
