<svg width="1040" height="620" viewBox="0 0 1040 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TELEMETRY STACK</title>
  <desc id="desc">Personal engineering radar for learning, building and shipping with O:DS technologies and product statuses.</desc>
  <!-- Update tracked hours, technologies and product statuses here when the learning log evolves. -->
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1040" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0D10"/>
      <stop offset="1" stop-color="#11151B"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#8C7355"/>
      <stop offset="0.55" stop-color="#B79C6A"/>
      <stop offset="1" stop-color="#D6C3A3"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { fill: #F4F1EB; font: 700 34px Arial, Helvetica, sans-serif; letter-spacing: 4px; }
      .subtitle { fill: #D6C3A3; font: 400 17px Arial, Helvetica, sans-serif; letter-spacing: .4px; }
      .micro { fill: #8C7355; font: 700 11px Arial, Helvetica, sans-serif; letter-spacing: 2px; }
      .section { fill: #B79C6A; font: 700 13px Arial, Helvetica, sans-serif; letter-spacing: 1.6px; }
      .text { fill: #F4F1EB; font: 500 15px Arial, Helvetica, sans-serif; }
      .muted { fill: #D6C3A3; font: 400 13px Arial, Helvetica, sans-serif; }
      .mono { fill: #F4F1EB; font: 700 13px Consolas, Menlo, monospace; letter-spacing: .6px; }
      .value { fill: #F4F1EB; font: 700 24px Arial, Helvetica, sans-serif; }
      .smallValue { fill: #D6C3A3; font: 700 14px Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <rect width="1040" height="620" rx="28" fill="url(#panel)"/>
  <rect x="18" y="18" width="1004" height="584" rx="22" stroke="#B79C6A" stroke-opacity=".45"/>
  <rect x="36" y="36" width="968" height="548" rx="16" stroke="#8C7355" stroke-opacity=".22"/>

  <path d="M64 120H976" stroke="#B79C6A" stroke-opacity=".28"/>
  <path d="M64 494H976" stroke="#B79C6A" stroke-opacity=".20"/>
  <path d="M650 148V468" stroke="#B79C6A" stroke-opacity=".18"/>

  <text x="64" y="78" class="label">TELEMETRY STACK</text>
  <text x="66" y="104" class="subtitle">Personal engineering radar — learning, building, shipping.</text>
  <text x="782" y="70" class="micro">O:DS / ENGINEERING RADAR</text>
  <text x="782" y="96" class="mono">4060h / 5000h</text>

  <text x="64" y="157" class="section">PRIMARY AXIS</text>
  <text x="64" y="190" class="value">Architecture métier &amp; supervision terrain</text>
  <rect x="64" y="216" width="520" height="14" rx="7" fill="#1A1E25"/>
  <rect x="64" y="216" width="422" height="14" rx="7" fill="url(#bronze)" filter="url(#softGlow)"/>
  <text x="64" y="257" class="muted">Tracked practice toward the current 5000h consolidation target</text>
  <text x="517" y="257" text-anchor="end" class="smallValue">81%</text>

  <text x="64" y="309" class="section">CORE TECHNOLOGIES</text>
  <g transform="translate(64 330)">
    <rect width="112" height="36" rx="18" fill="#11151B" stroke="#B79C6A" stroke-opacity=".55"/>
    <text x="56" y="23" text-anchor="middle" class="mono">Laravel</text>
    <rect x="124" width="96" height="36" rx="18" fill="#11151B" stroke="#B79C6A" stroke-opacity=".55"/>
    <text x="172" y="23" text-anchor="middle" class="mono">Vue 3</text>
    <rect x="232" width="94" height="36" rx="18" fill="#11151B" stroke="#B79C6A" stroke-opacity=".55"/>
    <text x="279" y="23" text-anchor="middle" class="mono">MySQL</text>
    <rect x="338" width="110" height="36" rx="18" fill="#11151B" stroke="#B79C6A" stroke-opacity=".55"/>
    <text x="393" y="23" text-anchor="middle" class="mono">Tailwind</text>
    <rect x="460" width="86" height="36" rx="18" fill="#11151B" stroke="#B79C6A" stroke-opacity=".55"/>
    <text x="503" y="23" text-anchor="middle" class="mono">HTMX</text>
  </g>

  <text x="64" y="421" class="section">STRATEGIC EXPLORATIONS</text>
  <g transform="translate(64 444)">
    <circle cx="7" cy="6" r="4" fill="#B79C6A"/>
    <text x="22" y="11" class="text">Flutter</text>
    <circle cx="127" cy="6" r="4" fill="#B79C6A"/>
    <text x="142" y="11" class="text">SIG / cartographie</text>
    <circle cx="320" cy="6" r="4" fill="#B79C6A"/>
    <text x="335" y="11" class="text">IA &amp; automatisation</text>
    <circle cx="526" cy="6" r="4" fill="#B79C6A"/>
    <text x="541" y="11" class="text">DevOps</text>
  </g>

